  // der content des feldes oben als eine liste von zeichen

  function toggleSelectionBold() {
    var editor = document.getElementById('editor');

    // Check if the editor is focused
    if (document.activeElement !== editor) {
      editor.focus();
    }

    // Get the current selection
    var selection = window.getSelection();

    if (selection.rangeCount > 0) {
      var range = selection.getRangeAt(0);
      var selectedText = range.toString();

      // Check if the selected text is already bold
      var isBold =

      // If the text is already bold, remove the <b> element
      if (isBold) {
        var boldElement = document.createElement('b');
        range.surroundContents(boldElement);
        var parent = boldElement.parentNode;
        parent.replaceChild(boldElement.firstChild, boldElement);
        parent.normalize(); // Merge adjacent text nodes
      } else {
        // Wrap the selected content in a <b> (bold) element
        var boldElement = document.createElement('b');
        range.surroundContents(boldElement);
      }
    }
  }


  function updateDebug() {
    var editor = document.getElementById('editor');
    var debug = document.getElementById('debug_content');

    // Get the text content of the editor
    var text = editor.innerHTML;

    // Get the current selection and range
    var sel = window.getSelection();
    var range = sel.getRangeAt(0);

    // Get the start container of the selection (parent node)
    var startContainer = range.startContainer;

    // Initialize line number to 1
    var lineNumber = 1;

    // one line is one div
    var all_divs = editor.getElementsByTagName('div');

    // Loop through all divs and check if the startContainer is a child of the div
    for (var i = 0; i < all_divs.length; i++) {
      if (all_divs[i].contains(startContainer)) {
        lineNumber = i + 1;
        break;
      }
    }

    // Update the debug information
    debug.innerHTML = 'Content: ' + text + '<br>';
    debug.innerHTML += 'Cursor Offset: ' + range.startOffset + '<br>';
    debug.innerHTML += 'Line Number: ' + lineNumber + '<br>';

    var lines_as_json = [];
    var lines = text.split("<div>");
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i];
      lines_as_json.push(line);
    }

    var json_content = document.getElementById('json_content');
    json_content.innerHTML = JSON.stringify(lines_as_json, null, 2);

    //alert(text)
  }
</script>
